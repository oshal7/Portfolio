<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oshal — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#080808; --txt-1:#f0ede8; --txt-2:#7a7673; --lime:#c8f135;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; background:var(--bg); color:var(--txt-1);
    font-family:'Inter',sans-serif; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; padding:24px;
  }
  h1{
    font-family:'Playfair Display',serif; font-style:italic; font-weight:400;
    font-size:clamp(2rem,6vw,3.2rem); margin:0 0 16px;
  }
  p{color:var(--txt-2); font-size:1.05rem; margin:0 0 28px; max-width:480px; line-height:1.6;}
  a.cta{
    color:var(--bg); background:var(--lime); text-decoration:none; font-weight:600;
    padding:12px 24px; border-radius:8px; transition:opacity .2s;
  }
  a.cta:hover{opacity:.85;}
</style>
</head>
<body>
  <h1>Hey, I'm Oshal.</h1>
  <p>Portfolio homepage coming soon. In the meantime, check out the side projects I build for fun.</p>
  <a class="cta" href="side-quests/">Side Quests →</a>
</body>
</html>
